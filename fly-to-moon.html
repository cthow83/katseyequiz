<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fly to the Moon!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #000a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px 16px 40px;
      color: white;
      user-select: none;
    }

    header {
      text-align: center;
      margin-bottom: 12px;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    .title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      color: #93c5fd;
      text-shadow: 0 0 24px rgba(59, 130, 246, 0.8), 0 2px 0 #1e3a8a;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #60a5fa;
      font-weight: 700;
      margin-top: 2px;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat-pill {
      background: rgba(29, 78, 216, 0.3);
      border: 1.5px solid rgba(96, 165, 250, 0.4);
      border-radius: 99px;
      padding: 5px 14px;
      font-size: 13px;
      font-weight: 800;
      color: #bfdbfe;
    }

    .stat-pill span {
      color: #60a5fa;
      font-weight: 900;
    }

    /* Journey progress bar */
    .journey-wrap {
      width: 100%;
      max-width: 420px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .journey-label {
      font-size: 12px;
      font-weight: 800;
      color: #60a5fa;
      white-space: nowrap;
    }

    .journey-track {
      flex: 1;
      height: 10px;
      background: rgba(29, 78, 216, 0.2);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid rgba(96, 165, 250, 0.3);
    }

    .journey-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #1d4ed8, #60a5fa, #bfdbfe);
      transition: width 0.3s;
    }

    .game-wrap {
      position: relative;
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(59, 130, 246, 0.4);
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.2);
      margin-bottom: 10px;
    }

    canvas {
      display: block;
      width: 100%;
      background: #000a1a;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      width: 100%;
      max-width: 420px;
      justify-content: space-between;
    }

    .ctrl-btn {
      flex: 1;
      background: rgba(29, 78, 216, 0.3);
      border: 2px solid rgba(96, 165, 250, 0.4);
      border-radius: 14px;
      padding: 14px;
      font-size: 1.5rem;
      cursor: pointer;
      color: #93c5fd;
      touch-action: none;
    }

    .ctrl-btn:active {
      background: rgba(59, 130, 246, 0.4);
    }

    .shoot-btn {
      flex: 1.5;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border: 2px solid #60a5fa;
      border-radius: 14px;
      padding: 14px;
      font-size: 0.95rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      cursor: pointer;
      color: white;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
      touch-action: none;
    }

    .shoot-btn:active {
      transform: scale(0.96);
    }

    .msg-bar {
      width: 100%;
      max-width: 420px;
      font-size: 13px;
      font-weight: 800;
      color: #bfdbfe;
      text-align: center;
      background: rgba(29, 78, 216, 0.2);
      border-radius: 10px;
      padding: 6px 16px;
      border: 1px solid rgba(96, 165, 250, 0.3);
      margin-bottom: 10px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .action-btn {
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 11px 26px;
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(59, 130, 246, 0.45);
      transition: transform 0.13s;
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .action-btn:active {
      transform: scale(0.97);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Back button */
    .back-btn {
      position: fixed;
      left: 12px;
      top: 12px;
      background: rgba(255, 255, 255, 0.06);
      color: #93c5fd;
      padding: 8px 12px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 800;
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 220;
    }

    .back-btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>

  <header>
    <div class="title">Fly to the Moon! 🌙</div>
    <div class="subtitle">Blast through the aliens and reach the moon!</div>
  </header>

  <a href="index.html" class="back-btn" aria-label="Back to index">← Back</a>

  <div class="stats-row">
    <div class="stat-pill">Score: <span id="score">0</span></div>
    <div class="stat-pill">Best: <span id="best">0</span></div>
    <div class="stat-pill">Lives: <span id="lives">❤️❤️❤️❤️❤️</span></div>
  </div>

  <div class="journey-wrap">
    <span class="journey-label">🚀 Earth</span>
    <div class="journey-track">
      <div class="journey-fill" id="journey-fill" style="width:0%"></div>
    </div>
    <span class="journey-label">🌙 Moon</span>
  </div>

  <div class="game-wrap">
    <canvas id="canvas" width="420" height="480"></canvas>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="left-btn">◀</button>
    <button class="shoot-btn" id="shoot-btn">🚀 FIRE!</button>
    <button class="ctrl-btn" id="right-btn">▶</button>
  </div>

  <div class="msg-bar" id="msg-bar">Move with ◀ ▶ and tap FIRE to shoot! Reach the moon! 🌙</div>
  <div class="btn-row">
    <button class="action-btn" onclick="startGame()">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const W = 420, H = 480;

    // Journey: 0 = Earth, 1 = Moon
    const JOURNEY_TOTAL = 5000; // total scroll distance to reach moon
    let journeyProgress = 0;

    let score = 0, best = 0, lives = 7;
    let gameState = 'idle';
    let frameId = null;
    let keys = { left: false, right: false };
    let shootCooldown = 0;

    const ship = {
      x: W / 2, y: H - 70,
      w: 40, h: 40,
      speed: 5.5,
      invincible: 0,
    };

    let bullets = [], aliens = [], explosions = [], stars = [], planets = [];
    let alienSpawnTimer = 0;
    let scrollSpeed = 1.5; // how fast we move towards moon

    const ALIEN_TYPES = [
      { emoji: '👾', points: 10 },
      { emoji: '👽', points: 15 },
      { emoji: '🛸', points: 20 },
      { emoji: '🤖', points: 25 },
    ];

    function makeStars() {
      stars = [];
      for (let i = 0; i < 100; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.8 + 0.3,
          spd: Math.random() * 1.5 + 0.5,
          op: Math.random() * 0.7 + 0.2,
        });
      }
      planets = [];
      // A couple of distant planets scrolling by
      for (let i = 0; i < 3; i++) {
        planets.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 18 + 8,
          colour: ['#7c3aed', '#1d4ed8', '#0f766e', '#b45309'][Math.floor(Math.random() * 4)],
          spd: 0.4 + Math.random() * 0.3,
        });
      }
    }

    function spawnAlienGroup() {
      // Spawn aliens in a row formation that scrolls down from the top
      const type = ALIEN_TYPES[Math.floor(Math.random() * ALIEN_TYPES.length)];
      const count = 3 + Math.floor(Math.random() * 2);
      const spacing = 44;
      const startX = W / 2 - (spacing * (count - 1)) / 2;
      const y = -40;
      // Random formation: row, V shape, scattered
      const formation = Math.floor(Math.random() * 3);
      for (let i = 0; i < count; i++) {
        let offsetY = 0;
        if (formation === 1) offsetY = Math.abs(i - count / 2) * 18; // V shape
        if (formation === 2) offsetY = (Math.random() - 0.5) * 60; // scattered
        aliens.push({
          x: startX + i * spacing,
          y: y + offsetY,
          w: 36, h: 36,
          type,
          alive: true,
          wobble: Math.random() * Math.PI * 2,
          vy: 0.7 + journeyProgress / JOURNEY_TOTAL * 0.8, // faster as you approach moon
        });
      }
    }

    function startGame() {
      score = 0; lives = 7; journeyProgress = 0;
      bullets = []; aliens = []; explosions = [];
      ship.x = W / 2; ship.invincible = 0;
      shootCooldown = 0; alienSpawnTimer = 0;
      gameState = 'running';
      updateHUD();
      makeStars();
      document.getElementById('journey-fill').style.width = '0%';
      document.getElementById('msg-bar').textContent = 'Blast through the aliens and reach the moon! 🌙';
      if (frameId) cancelAnimationFrame(frameId);
      frameId = requestAnimationFrame(loop);
    }

    function shoot() {
      if (gameState === 'idle' || gameState === 'dead' || gameState === 'win') { startGame(); return; }
      if (gameState !== 'running') return;
      if (shootCooldown > 0) return;
      bullets.push({ x: ship.x, y: ship.y - 20, w: 4, h: 14, vy: -12, alien: false });
      shootCooldown = 12;
    }

    // Controls
    document.addEventListener('keydown', e => {
      if (e.code === 'ArrowLeft') keys.left = true;
      if (e.code === 'ArrowRight') keys.right = true;
      if (e.code === 'Space') { e.preventDefault(); shoot(); }
    });
    document.addEventListener('keyup', e => {
      if (e.code === 'ArrowLeft') keys.left = false;
      if (e.code === 'ArrowRight') keys.right = false;
    });

    const leftBtn = document.getElementById('left-btn');
    const rightBtn = document.getElementById('right-btn');
    const shootBtn = document.getElementById('shoot-btn');
    leftBtn.addEventListener('touchstart', e => { e.preventDefault(); keys.left = true; }, { passive: false });
    leftBtn.addEventListener('touchend', e => { e.preventDefault(); keys.left = false; }, { passive: false });
    rightBtn.addEventListener('touchstart', e => { e.preventDefault(); keys.right = true; }, { passive: false });
    rightBtn.addEventListener('touchend', e => { e.preventDefault(); keys.right = false; }, { passive: false });
    shootBtn.addEventListener('touchstart', e => { e.preventDefault(); shoot(); }, { passive: false });
    shootBtn.addEventListener('click', shoot);
    leftBtn.addEventListener('mousedown', () => keys.left = true);
    leftBtn.addEventListener('mouseup', () => keys.left = false);
    rightBtn.addEventListener('mousedown', () => keys.right = true);
    rightBtn.addEventListener('mouseup', () => keys.right = false);

    function updateHUD() {
      document.getElementById('score').textContent = score;
      document.getElementById('best').textContent = best;
      document.getElementById('lives').textContent = lives <= 0 ? '💔' : '❤️'.repeat(lives);
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      drawBackground();

      if (gameState === 'running') update();

      drawPlanets();
      drawAliens();
      drawBullets();
      drawShip();
      drawExplosions();
      drawMoonProgress();

      if (gameState === 'idle') drawScreen('Fly to the Moon! 🌙', 'Blast through the aliens\nand reach the moon!', 'Tap FIRE or press Space to start!');
      if (gameState === 'dead') drawScreen('Game Over! 💔', `Score: ${score}  Best: ${best}`, 'Tap Restart to try again!');
      if (gameState === 'win') drawWinScreen();

      frameId = requestAnimationFrame(loop);
    }

    function update() {
      // Move ship
      if (keys.left) ship.x = Math.max(ship.w / 2 + 5, ship.x - ship.speed);
      if (keys.right) ship.x = Math.min(W - ship.w / 2 - 5, ship.x + ship.speed);
      if (ship.invincible > 0) ship.invincible--;
      if (shootCooldown > 0) shootCooldown--;

      // Journey progress
      journeyProgress = Math.min(JOURNEY_TOTAL, journeyProgress + scrollSpeed);
      const pct = journeyProgress / JOURNEY_TOTAL;
      document.getElementById('journey-fill').style.width = (pct * 100) + '%';

      // Scroll stars downward (ship flying up)
      stars.forEach(s => {
        s.y += s.spd + scrollSpeed * 0.5;
        if (s.y > H) { s.y = -5; s.x = Math.random() * W; }
      });

      // Scroll planets
      planets.forEach(p => {
        p.y += p.spd;
        if (p.y - p.r > H) { p.y = -p.r; p.x = Math.random() * W; }
      });

      // Alien spawn — more frequent closer to moon
      alienSpawnTimer++;
      const spawnInterval = Math.max(160, 280 - pct * 80);
      if (alienSpawnTimer >= spawnInterval) {
        alienSpawnTimer = 0;
        spawnAlienGroup();
      }

      // Move aliens down (they're blocking the path)
      for (let i = aliens.length - 1; i >= 0; i--) {
        const a = aliens[i];
        if (!a.alive) { aliens.splice(i, 1); continue; }
        a.y += a.vy;
        a.wobble += 0.07;
        // Side wobble
        a.x += Math.sin(a.wobble) * 0.8;

        // Alien shoots occasionally
        if (Math.random() < 0.001 + pct * 0.001) {
          bullets.push({ x: a.x, y: a.y + 20, w: 5, h: 12, vy: 2.2 + pct * 1, alien: true });
        }

        // Alien passes ship bottom — lose a life
        if (a.y > H + 20) {
          aliens.splice(i, 1);
          lives = Math.max(0, lives - 1);
          updateHUD();
          if (lives <= 0) { gameState = 'dead'; document.getElementById('msg-bar').textContent = `Game over! You scored ${score}!`; return; }
        }

        // Alien collides with ship
        if (ship.invincible === 0 &&
          Math.abs(a.x - ship.x) < (a.w / 2 + ship.w / 2 - 8) &&
          Math.abs(a.y - ship.y) < (a.h / 2 + ship.h / 2 - 8)) {
          aliens.splice(i, 1);
          lives = Math.max(0, lives - 1);
          ship.invincible = 120;
          spawnExplosion(ship.x, ship.y, '#f87171');
          updateHUD();
          if (lives <= 0) { gameState = 'dead'; document.getElementById('msg-bar').textContent = `Game over! You scored ${score}!`; return; }
        }
      }

      // Player bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.y += b.vy;
        if (b.y < -20 || b.y > H + 20) { bullets.splice(i, 1); continue; }

        if (!b.alien) {
          // Hit alien?
          let hit = false;
          for (let j = aliens.length - 1; j >= 0; j--) {
            const a = aliens[j];
            if (!a.alive) continue;
            if (Math.abs(b.x - a.x) < a.w / 2 && Math.abs(b.y - a.y) < a.h / 2) {
              a.alive = false;
              score += a.type.points;
              if (score > best) best = score;
              updateHUD();
              spawnExplosion(a.x, a.y, '#60a5fa');
              bullets.splice(i, 1);
              hit = true;
              break;
            }
          }
          if (hit) continue;
        } else {
          // Alien bullet hits ship
          if (ship.invincible === 0 &&
            Math.abs(b.x - ship.x) < ship.w / 2 &&
            Math.abs(b.y - ship.y) < ship.h / 2) {
            bullets.splice(i, 1);
            lives = Math.max(0, lives - 1);
            ship.invincible = 120;
            spawnExplosion(ship.x, ship.y, '#f87171');
            updateHUD();
            document.getElementById('msg-bar').textContent = lives > 0 ? `Oops! ${lives} lives left! 🚀` : '';
            if (lives <= 0) { gameState = 'dead'; document.getElementById('msg-bar').textContent = `Game over! You scored ${score}!`; return; }
          }
        }
      }

      // Explosions
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].life -= 0.04;
        if (explosions[i].life <= 0) explosions.splice(i, 1);
      }

      // Reached the moon!
      if (journeyProgress >= JOURNEY_TOTAL) {
        gameState = 'win';
        if (score > best) best = score;
        updateHUD();
        document.getElementById('msg-bar').textContent = `You reached the moon! 🌙 Score: ${score}!`;
      }

      // Update msg during journey
      if (gameState === 'running') {
        if (pct < 0.15) document.getElementById('msg-bar').textContent = '🚀 Just left Earth — blast through the aliens!';
        else if (pct < 0.35) document.getElementById('msg-bar').textContent = '🌌 Leaving the atmosphere — keep going!'; else if (pct < 0.55) document.getElementById('msg-bar').textContent = '🌌 Deep space — the aliens are getting faster!'; else if (pct < 0.7) document.getElementById('msg-bar').textContent = '⭐ Halfway to the moon — great flying!';
        else if (pct < 0.85) document.getElementById('msg-bar').textContent = '🌙 Getting close — keep blasting!'; else if (pct < 0.95) document.getElementById('msg-bar').textContent = '🌙 Almost there — nearly at the moon!';
      }
    }

    function spawnExplosion(x, y, colour) {
      for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        explosions.push({ x, y, vx: Math.cos(angle) * 3, vy: Math.sin(angle) * 3, r: 4, life: 1, colour });
      }
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#000510');
      grad.addColorStop(1, '#000a1a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(191,219,254,${s.op})`;
        ctx.fill();
      });
    }

    function drawPlanets() {
      planets.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.colour;
        ctx.globalAlpha = 0.25;
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    function drawMoonProgress() {
      // Show the moon getting closer at top of screen
      const pct = journeyProgress / JOURNEY_TOTAL;
      const moonY = -30 + pct * (H * 0.25);
      const moonSize = 20 + pct * 30;

      ctx.beginPath();
      ctx.arc(W - 50, moonY, moonSize, 0, Math.PI * 2);
      ctx.fillStyle = '#e2e8f0';
      ctx.shadowColor = '#bfdbfe';
      ctx.shadowBlur = moonSize;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Craters
      ctx.fillStyle = '#cbd5e1';
      ctx.beginPath(); ctx.arc(W - 56, moonY - 6, moonSize * 0.15, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(W - 44, moonY + 8, moonSize * 0.1, 0, Math.PI * 2); ctx.fill();

      // Earth at bottom
      const earthPct = 1 - pct;
      if (earthPct > 0.1) {
        const earthY = H + 20 - earthPct * 50;
        ctx.beginPath();
        ctx.arc(50, earthY, 25 * earthPct, 0, Math.PI * 2);
        ctx.fillStyle = '#1d4ed8';
        ctx.globalAlpha = earthPct * 0.8;
        ctx.fill();
        ctx.fillStyle = '#15803d';
        ctx.beginPath(); ctx.ellipse(44, earthY - 4, 8 * earthPct, 5 * earthPct, -0.3, 0, Math.PI * 2); ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function drawShip() {
      if (ship.invincible > 0 && Math.floor(ship.invincible / 5) % 2 === 0) return;
      const x = ship.x, y = ship.y;

      ctx.shadowColor = '#3b82f6';
      ctx.shadowBlur = 18;

      // Engine flame
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath();
      ctx.moveTo(x - 8, y + 18); ctx.lineTo(x, y + 30 + Math.sin(Date.now() / 80) * 5); ctx.lineTo(x + 8, y + 18);
      ctx.fill();
      ctx.fillStyle = '#f97316';
      ctx.beginPath();
      ctx.moveTo(x - 5, y + 18); ctx.lineTo(x, y + 23 + Math.sin(Date.now() / 60) * 3); ctx.lineTo(x + 5, y + 18);
      ctx.fill();

      // Body
      ctx.fillStyle = '#1d4ed8';
      ctx.beginPath();
      ctx.moveTo(x, y - 22); ctx.lineTo(x + 18, y + 16); ctx.lineTo(x - 18, y + 16);
      ctx.closePath(); ctx.fill();

      // Cockpit
      ctx.fillStyle = '#93c5fd';
      ctx.beginPath(); ctx.ellipse(x, y, 8, 10, 0, 0, Math.PI * 2); ctx.fill();

      // Wings
      ctx.fillStyle = '#2563eb';
      ctx.beginPath(); ctx.moveTo(x - 18, y + 16); ctx.lineTo(x - 28, y + 20); ctx.lineTo(x - 12, y + 4); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + 18, y + 16); ctx.lineTo(x + 28, y + 20); ctx.lineTo(x + 12, y + 4); ctx.fill();

      ctx.shadowBlur = 0;
    }

    function drawAliens() {
      aliens.forEach(a => {
        if (!a.alive) return;
        ctx.font = `${a.w}px serif`;
        ctx.textAlign = 'center';
        ctx.fillText(a.type.emoji, a.x, a.y + a.h / 2);
      });
      ctx.textAlign = 'left';
    }

    function drawBullets() {
      bullets.forEach(b => {
        if (b.alien) {
          ctx.shadowColor = '#f87171'; ctx.shadowBlur = 8;
          ctx.fillStyle = '#fca5a5';
        } else {
          ctx.shadowColor = '#60a5fa'; ctx.shadowBlur = 10;
          ctx.fillStyle = '#bfdbfe';
        }
        ctx.beginPath();
        ctx.roundRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h, 3);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    function drawExplosions() {
      explosions.forEach(e => {
        ctx.globalAlpha = e.life;
        ctx.fillStyle = e.colour;
        ctx.shadowColor = e.colour; ctx.shadowBlur = 8;
        ctx.beginPath();
        ctx.arc(e.x + e.vx * (1 - e.life) * 15, e.y + e.vy * (1 - e.life) * 15, e.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1; ctx.shadowBlur = 0;
    }

    function drawScreen(title, sub, hint) {
      ctx.fillStyle = 'rgba(0,10,26,0.8)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#93c5fd';
      ctx.font = 'bold 26px Fredoka One';
      ctx.textAlign = 'center';
      ctx.fillText(title, W / 2, H / 2 - 40);
      ctx.font = 'bold 15px Nunito';
      ctx.fillStyle = '#60a5fa';
      sub.split('\n').forEach((l, i) => ctx.fillText(l, W / 2, H / 2 + i * 24));
      if (hint) {
        ctx.font = 'bold 13px Nunito';
        ctx.fillStyle = '#bfdbfe';
        ctx.fillText(hint, W / 2, H / 2 + 60);
      }
      ctx.textAlign = 'left';
    }

    function drawWinScreen() {
      ctx.fillStyle = 'rgba(0,10,26,0.85)';
      ctx.fillRect(0, 0, W, H);
      ctx.font = '60px serif';
      ctx.textAlign = 'center';
      ctx.fillText('🌙', W / 2, H / 2 - 60);
      ctx.fillStyle = '#bfdbfe';
      ctx.font = 'bold 30px Fredoka One';
      ctx.fillText('You made it!', W / 2, H / 2 - 10);
      ctx.font = 'bold 16px Nunito';
      ctx.fillStyle = '#60a5fa';
      ctx.fillText(`You reached the moon! 🚀`, W / 2, H / 2 + 18);
      ctx.fillText(`Score: ${score}`, W / 2, H / 2 + 44);
      ctx.font = 'bold 13px Nunito';
      ctx.fillStyle = '#bfdbfe';
      ctx.fillText('Tap Restart to play again!', W / 2, H / 2 + 74);
      ctx.textAlign = 'left';
    }

    makeStars();
    frameId = requestAnimationFrame(loop);
  </script>
</body>

</html>
