<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Memory Game</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: #1a0533;
    background-image:
      radial-gradient(ellipse at 20% 20%, #2d0a5e 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, #3b0764 0%, transparent 50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    color: white;
  }

  .stars-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 0.6; transform: scale(1); }
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-bottom: 14px;
    animation: popIn 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .title {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: #e9d5ff;
    text-shadow: 0 0 30px rgba(168,85,247,0.8), 0 2px 0 #6d28d9;
    line-height: 1.1;
  }

  .subtitle {
    font-size: 0.9rem;
    color: #c084fc;
    font-weight: 700;
    margin-top: 4px;
  }

  .stats-row {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-pill {
    background: rgba(109,40,217,0.35);
    border: 1.5px solid rgba(168,85,247,0.4);
    border-radius: 99px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 800;
    color: #e9d5ff;
  }

  .stat-pill span { color: #c084fc; font-weight: 900; }

  .subject-tabs {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
    background: rgba(109,40,217,0.2);
    border-radius: 12px;
    padding: 5px;
    border: 1px solid rgba(168,85,247,0.25);
  }

  .tab {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
    border: none;
    background: transparent;
    color: #a78bfa;
    transition: all 0.2s;
  }

  .tab.active { background: #7c3aed; color: white; box-shadow: 0 3px 12px rgba(124,58,237,0.5); }
  .tab:hover:not(.active) { background: rgba(124,58,237,0.3); color: #e9d5ff; }

  .grid {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 560px;
    margin-bottom: 12px;
  }

  .card-wrap {
    aspect-ratio: 4/3;
    perspective: 600px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.4s cubic-bezier(0.34,1.1,0.64,1);
    border-radius: 12px;
  }

  .card-wrap.flipped .card-inner { transform: rotateY(180deg); }
  .card-wrap.matched .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    width: 100%; height: 100%;
    border-radius: 12px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6px;
  }

  .card-front {
    background: linear-gradient(135deg, #4c1d95, #6d28d9);
    border: 2px solid rgba(168,85,247,0.5);
    font-size: 1.6rem;
    box-shadow: 0 4px 16px rgba(109,40,217,0.4);
    transition: border-color 0.2s;
  }

  .card-wrap:hover:not(.flipped):not(.matched) .card-front {
    border-color: rgba(192,132,252,0.9);
  }

  .card-back {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    border: 2px solid #c084fc;
    transform: rotateY(180deg);
    font-size: clamp(0.7rem, 2vw, 0.9rem);
    font-weight: 800;
    color: white;
    line-height: 1.3;
    box-shadow: 0 4px 20px rgba(168,85,247,0.5);
  }

  .card-wrap.matched .card-back {
    background: linear-gradient(135deg, #059669, #10b981);
    border-color: #34d399;
    box-shadow: 0 4px 20px rgba(16,185,129,0.5);
    animation: matchPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .card-subject {
    font-size: 0.55rem;
    font-weight: 900;
    letter-spacing: 1px;
    opacity: 0.75;
    display: block;
    margin-bottom: 3px;
    text-transform: uppercase;
  }

  .msg-bar {
    position: relative;
    z-index: 1;
    font-size: 14px;
    font-weight: 800;
    color: #e9d5ff;
    text-align: center;
    margin-bottom: 12px;
    background: rgba(109,40,217,0.25);
    border-radius: 10px;
    padding: 7px 16px;
    border: 1px solid rgba(168,85,247,0.3);
    width: 100%;
    max-width: 560px;
  }

  .btn-row {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 10px;
  }

  .action-btn {
    background: linear-gradient(135deg, #7c3aed, #a855f7);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 11px 26px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(124,58,237,0.45);
    transition: transform 0.13s, box-shadow 0.13s;
  }

  .action-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 20px rgba(124,58,237,0.55); }
  .action-btn:active { transform: scale(0.97); }

  .win-overlay {
    display: none;
    position: relative;
    z-index: 1;
    text-align: center;
    background: rgba(109,40,217,0.3);
    border: 2px solid rgba(168,85,247,0.5);
    border-radius: 24px;
    padding: 32px 24px;
    width: 100%;
    max-width: 560px;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .win-title {
    font-family: 'Fredoka One', cursive;
    font-size: 2.2rem;
    color: #e9d5ff;
    text-shadow: 0 0 20px rgba(168,85,247,0.8);
    margin-bottom: 8px;
  }

  .win-stars { font-size: 2.2rem; margin-bottom: 10px; }

  .win-stats {
    font-size: 1rem;
    color: #c084fc;
    font-weight: 700;
    margin-bottom: 22px;
    line-height: 1.7;
  }

  .win-stats strong { color: #e9d5ff; }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.1); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  @media (max-width: 420px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
    .subject-tabs { flex-wrap: wrap; justify-content: center; }
  }
</style>
</head>
<body>

<div class="stars-bg" id="stars-bg"></div>

<header>
  <div class="title">School Memory Game 💜</div>
  <div class="subtitle">Match the question to the answer!</div>
</header>

<div class="stats-row">
  <div class="stat-pill">Moves: <span id="moves">0</span></div>
  <div class="stat-pill">Matched: <span id="matched">0</span> / <span id="total">6</span></div>
  <div class="stat-pill">Time: <span id="timer">0:00</span></div>
</div>

<div class="subject-tabs">
  <button class="tab active" onclick="setSubject('all', event)">All</button>
  <button class="tab" onclick="setSubject('math', event)">Maths</button>
  <button class="tab" onclick="setSubject('english', event)">English</button>
  <button class="tab" onclick="setSubject('science', event)">Science</button>
</div>

<div class="grid" id="grid"></div>
<div class="msg-bar" id="msg-bar">Flip two cards to find a matching pair!</div>

<div class="btn-row">
  <button class="action-btn" onclick="startGame()">New game</button>
</div>

<div class="win-overlay" id="win-overlay">
  <div class="win-stars" id="win-stars"></div>
  <div class="win-title" id="win-title"></div>
  <div class="win-stats" id="win-stats"></div>
  <button class="action-btn" onclick="startGame()">Play again! 💜</button>
</div>

<script>
const allPairs = {
  math: [
    { q: "5 × 6 = ?",   a: "30" },
    { q: "24 ÷ 4 = ?",  a: "6" },
    { q: "Half of 18",  a: "9" },
    { q: "7 + 8 = ?",   a: "15" },
    { q: "20 − 13 = ?", a: "7" },
    { q: "3 × 9 = ?",   a: "27" },
    { q: "Double 14",   a: "28" },
    { q: "36 ÷ 6 = ?",  a: "6" },
    { q: "100 − 37 = ?",a: "63" },
    { q: "4 × 7 = ?",   a: "28" },
  ],
  english: [
    { q: "Opposite of 'hot'",     a: "Cold" },
    { q: "Plural of 'child'",     a: "Children" },
    { q: "A doing word",          a: "Verb" },
    { q: "Opposite of 'noisy'",   a: "Quiet" },
    { q: "A describing word",     a: "Adjective" },
    { q: "Synonym of 'happy'",    a: "Joyful" },
    { q: "Plural of 'mouse'",     a: "Mice" },
    { q: "Opposite of 'ancient'", a: "Modern" },
    { q: "A naming word",         a: "Noun" },
    { q: "Plural of 'tooth'",     a: "Teeth" },
  ],
  science: [
    { q: "What do plants need?",         a: "Sunlight" },
    { q: "Gas we breathe in",            a: "Oxygen" },
    { q: "Closest planet to the Sun",    a: "Mercury" },
    { q: "What do bees make?",           a: "Honey" },
    { q: "Ice is a...",                  a: "Solid" },
    { q: "Tadpoles grow into...",        a: "Frogs" },
    { q: "Force that pulls things down", a: "Gravity" },
    { q: "What is H₂O?",               a: "Water" },
    { q: "Animals that eat only meat",   a: "Carnivores" },
    { q: "Hot ball of gas in the sky",   a: "The Sun" },
  ]
};

let currentSubject = 'all';
let flipped = [], matched = 0, moves = 0, canFlip = true;
let timerInterval = null, seconds = 0;
let activePairs = [];

function setSubject(sub, e) {
  currentSubject = sub;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (e) e.target.classList.add('active');
  startGame();
}

function getPairs() {
  let pool = [];
  if (currentSubject === 'all') {
    pool = [
      ...allPairs.math.map(p => ({...p, sub: 'MATHS'})),
      ...allPairs.english.map(p => ({...p, sub: 'ENGLISH'})),
      ...allPairs.science.map(p => ({...p, sub: 'SCIENCE'})),
    ];
  } else {
    pool = allPairs[currentSubject].map(p => ({...p, sub: currentSubject.toUpperCase()}));
  }
  return shuffle(pool).slice(0, 6);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  clearInterval(timerInterval);
  seconds = 0; moves = 0; matched = 0; flipped = []; canFlip = true;
  activePairs = getPairs();

  document.getElementById('moves').textContent = 0;
  document.getElementById('matched').textContent = 0;
  document.getElementById('total').textContent = activePairs.length;
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('msg-bar').textContent = 'Flip two cards to find a matching pair!';
  document.getElementById('win-overlay').style.display = 'none';
  document.getElementById('grid').style.display = 'grid';
  document.getElementById('msg-bar').style.display = 'block';
  document.querySelector('.btn-row').style.display = 'flex';

  const cards = [];
  activePairs.forEach((pair, i) => {
    cards.push({ id: i,                      pairId: i, text: pair.q, sub: pair.sub });
    cards.push({ id: i + activePairs.length, pairId: i, text: pair.a, sub: pair.sub });
  });

  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  shuffle(cards).forEach(card => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';
    wrap.dataset.pairId = card.pairId;
    wrap.dataset.cardId = card.id;
    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-front">⭐</div>
        <div class="card-back">
          <div>
            <span class="card-subject">${card.sub}</span>
            ${card.text}
          </div>
        </div>
      </div>`;
    wrap.addEventListener('click', () => flipCard(wrap));
    grid.appendChild(wrap);
  });

  timerInterval = setInterval(() => {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    document.getElementById('timer').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  }, 1000);
}

function flipCard(wrap) {
  if (!canFlip) return;
  if (wrap.classList.contains('flipped') || wrap.classList.contains('matched')) return;
  if (flipped.length >= 2) return;

  wrap.classList.add('flipped');
  flipped.push(wrap);

  if (flipped.length === 2) {
    moves++;
    document.getElementById('moves').textContent = moves;
    canFlip = false;

    const [a, b] = flipped;
    if (a.dataset.pairId === b.dataset.pairId && a.dataset.cardId !== b.dataset.cardId) {
      a.classList.add('matched');
      b.classList.add('matched');
      matched++;
      document.getElementById('matched').textContent = matched;
      flipped = [];
      canFlip = true;
      document.getElementById('msg-bar').textContent = matched === activePairs.length
        ? "You matched them all! 🎉"
        : ["Great match! 💜", "Brilliant! ⭐", "Keep going! 🌟", "Nice one! 🎯"][Math.floor(Math.random() * 4)];
      if (matched === activePairs.length) setTimeout(showWin, 600);
    } else {
      document.getElementById('msg-bar').textContent = "Not a match — try again!";
      setTimeout(() => {
        a.classList.remove('flipped');
        b.classList.remove('flipped');
        flipped = [];
        canFlip = true;
        document.getElementById('msg-bar').textContent = 'Flip two cards to find a matching pair!';
      }, 1000);
    }
  }
}

function showWin() {
  clearInterval(timerInterval);
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  const timeStr = `${m}:${s.toString().padStart(2, '0')}`;
  const rating = moves <= activePairs.length + 2 ? 5 : moves <= activePairs.length + 5 ? 4 : moves <= activePairs.length + 9 ? 3 : 2;
  const starStr = '⭐'.repeat(rating) + '🌑'.repeat(5 - rating);

  document.getElementById('grid').style.display = 'none';
  document.getElementById('msg-bar').style.display = 'none';
  document.querySelector('.btn-row').style.display = 'none';
  document.getElementById('win-stars').textContent = starStr;
  document.getElementById('win-title').textContent =
    rating === 5 ? "Amazing memory! 🧠" : rating >= 4 ? "Brilliant job! 💜" : "Well done! ⭐";
  document.getElementById('win-stats').innerHTML =
    `You matched all <strong>${activePairs.length} pairs</strong> in <strong>${timeStr}</strong> with <strong>${moves} moves</strong>!<br>
    ${rating === 5 ? "You have a superstar memory!" : rating >= 4 ? "Fantastic — try for even fewer moves!" : "Great work! Play again to beat your score!"}`;
  document.getElementById('win-overlay').style.display = 'block';
}

function makeStars() {
  const bg = document.getElementById('stars-bg');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    bg.appendChild(s);
  }
}

makeStars();
startGame();
</script>
</body>
</html>
